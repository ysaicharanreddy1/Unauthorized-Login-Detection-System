<!DOCTYPE html>
<html>
<head>
    <title>Unauthorized Login Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="background"></div>

<div class="login-container">
    <h2 class="title">🔐 Unauthorized Login Detection System</h2>
    <p class="subtitle">Secure Role-Based Authentication Portal</p>

    {% if success %}
        <p style="color: #00ff88; font-weight: bold;">{{ success }}</p>
    {% endif %}

    {% if error %}
        <p style="color: #ff4d4d; font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">

        <label>Select Role</label>
        <select name="role">
            <option value="admin">Admin</option>
            <option value="user">User</option>
        </select>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password">

        {% if show_security %}
            <label>Security Question: What is your mother's name?</label>
            <input type="text" name="security_answer" placeholder="Enter Answer">
        {% endif %}

        {% if show_mfa %}
            <label>Enter MFA Code</label>
            <input type="text" name="otp" placeholder="Enter OTP">
        {% endif %}

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
